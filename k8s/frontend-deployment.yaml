apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceyourexam-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: aceyourexam-frontend
          imagePullPolicy: Never
          ports:
            - containerPort: 80
